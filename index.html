// ── QUEST DATA ────────────────────────────────────────────────────────────────
const Q = [
  { icon:'🧌', clue:'Find the place a troll would live!', code:'5368',
    tl:'⛏️ Minecraft', tb:'tb-mc', qc:'q-minecraft',

  { icon:'💀', clue:'Find the skeleton of a shed!', code:'6789',

    tl:'🔦 Stranger Things', tb:'tb-st', qc:'q-stranger',

    exp:'Eleven! She escaped the lab and uses her mind powers to fight the Upside Down!' },
  { icon:'🐰', clue:'Find the white rabbit at the end of the driveway!', code:'3678',

    opts:['Raw Chicken','Fish','Meat','Bone'], ans:3,
    exp:'Bones! Get them from skeletons at night, then feed them to a wild wolf!' },
  { icon:'📬', clue:'Where does the house mail come?', code:'6789',

    q:'What year is Stranger Things Season 1 set in?',
    opts:['1979','1991','1985','1983'], ans:3,
    exp:'1983! Packed with 80s nostalgia — the music, fashion and movie references!' },
  { icon:'💦', clue:"You're going to need to get wet for this one!", code:'5667',
    tl:'⚡ Fortnite', tb:'tb-fn', qc:'q-fortnite',
    q:'What unique mechanic sets Fortnite apart from all other battle royale games?',
    opts:['Bigger map','More players','Building structures','Faster storm'], ans:2,
    exp:'Building! Collecting materials to build walls, ramps and forts is what makes Fortnite unique!' }
];

const FINALE_INDEX = Q.length - 1;
const ROUTE_LENGTH = Q.length - 1;

// ── ROUTE HELPER ──────────────────────────────────────────────────────────────
function routeIndex(team, step) {
  if (step >= ROUTE_LENGTH) return FINALE_INDEX;
  return (team.startOffset + step) % ROUTE_LENGTH;
}

// ── STATE ─────────────────────────────────────────────────────────────────────
const DEF = [
  {emoji:'🦁', name:'Team Alpha'},
  {emoji:'🐉', name:'Team Dragon'},
  {emoji:'🚀', name:'Team Rocket'},
  {emoji:'🦊', name:'Team Fox'}
];
const EMJ = ['🦁','🐉','🚀','🦊','⚡','🔥','🌊','🎯'];

function makeTeam(d, i, totalTeams) {
  const offset = Math.round((i / totalTeams) * ROUTE_LENGTH) % ROUTE_LENGTH;
  return {
    emoji: d.emoji || EMJ[i] || '⭐',
    name:  d.name  || 'Team ' + (i + 1),
    step:  0, correct: 0, wrong: 0,
    done: false, waitQ: false,
    startOffset: offset
  };
}

let localTeams = DEF.map((d, i) => makeTeam(d, i, DEF.length));
let localPin   = '1234';
let liveTeams  = {};
let liveActs   = [];
let ci         = 0;
const T = () => localTeams[ci];

// ── FIREBASE ──────────────────────────────────────────────────────────────────
async function fbGet(p) {
  const snap = await dbRef(p).get();
  return snap.exists() ? snap.val() : null;
}
function fbSet(p, v)         { return dbRef(p).set(v); }
function pushTeam(i, t)      { return fbSet('game/teams/' + i, t); }
function pushAct(text, icon) {
  const t = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  return fbSet('game/activity/' + Date.now(), {text, icon, time: t});
}

async function loadFromFB() {
  try {
    const data = await fbGet('game');
    if (data) {
      if (data.teams) {
        liveTeams  = data.teams;
        localTeams = Object.values(data.teams);
        localTeams.forEach((t, i) => {
          if (t.startOffset === undefined)
            t.startOffset = Math.round((i / localTeams.length) * ROUTE_LENGTH) % ROUTE_LENGTH;
        });
      }
      if (data.pin)      localPin = data.pin;
      if (data.activity) liveActs = Object.values(data.activity).sort((a,b) => a.time > b.time ? 1 : -1);
    }
    document.getElementById('home-status').textContent = '🟢 Connected — game ready!';
    document.getElementById('home-status').style.color = '#39ff14';
  } catch(e) {
    console.error(e);
    document.getElementById('home-status').textContent = '⚠️ Connection error — check internet';
    document.getElementById('home-status').style.color = '#ff2d78';
  }
}

function startListening() {
  dbRef('game/teams').on('value', snap => {
    if (snap.exists()) {
      liveTeams  = snap.val();
      localTeams = Object.values(liveTeams);
      localTeams.forEach((t, i) => {
        if (t.startOffset === undefined)
          t.startOffset = Math.round((i / localTeams.length) * ROUTE_LENGTH) % ROUTE_LENGTH;
      });
      if (document.getElementById('dashboard').classList.contains('active'))   drawDash();
      if (document.getElementById('team-select').classList.contains('active')) drawTeamSelect();
    }
  });
  dbRef('game/activity').on('value', snap => {
    if (snap.exists()) {
      liveActs = Object.values(snap.val()).sort((a,b) => a.time > b.time ? 1 : -1);
      if (document.getElementById('dashboard').classList.contains('active')) drawDash();
    }
  });
  dbRef('game/pin').on('value', snap => { if (snap.exists()) localPin = snap.val(); });
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
window.go = id => {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
  if (id === 'setup')       drawSetup();
  if (id === 'team-select') drawTeamSelect();
  if (id === 'dashboard')   drawDash();
};

// ── SETUP ─────────────────────────────────────────────────────────────────────
function drawSetup() {
  document.getElementById('pin-setup').value = localPin === '1234' ? '' : localPin;
  document.getElementById('teams-grid').innerHTML = localTeams.map((t, i) => `
    <div class="team-row">
      <span>${t.emoji}</span>
      <input value="${t.name}" placeholder="Team name" onchange="localTeams[${i}].name=this.value||'Team ${i+1}'">
      <span style="font-size:0.7rem;color:#555;white-space:nowrap">starts Q${(t.startOffset||0)+1}</span>
      ${localTeams.length > 2 ? `<button onclick="rmTeam(${i})" style="background:none;border:none;color:#ff2d78;font-size:1.2rem;cursor:pointer">✕</button>` : ''}
    </div>`).join('');
}
window.drawSetup = drawSetup;

window.addTeam = () => {
  if (localTeams.length >= 8) { showToast('Max 8 teams!', 1); return; }
  const newTeams = [...localTeams, {emoji: EMJ[localTeams.length] || '⭐', name: 'Team ' + (localTeams.length + 1)}];
  localTeams = newTeams.map((t, i) => makeTeam(t, i, newTeams.length));
  drawSetup();
};

window.rmTeam = i => {
  if (localTeams.length <= 2) { showToast('Need at least 2 teams!', 1); return; }
  localTeams.splice(i, 1);
  localTeams = localTeams.map((t, idx) => ({
    ...t,
    startOffset: Math.round((idx / localTeams.length) * ROUTE_LENGTH) % ROUTE_LENGTH
  }));
  drawSetup();
};

window.saveSetup = async () => {
  const p = document.getElementById('pin-setup').value.trim();
  if (/^\d{4}$/.test(p)) localPin = p;
  localTeams = localTeams.map((t, i) => makeTeam(t, i, localTeams.length));
  const to = {};
  localTeams.forEach((t, i) => to[i] = t);
  await fbSet('game', {teams: to, pin: localPin, activity: {}});
  showToast('Game launched! 🚀');
  setTimeout(() => go('team-select'), 700);
};

// ── TEAM SELECT ───────────────────────────────────────────────────────────────
function drawTeamSelect() {
  document.getElementById('teams-list').innerHTML = localTeams.map((t, i) => `
    <button class="team-btn" onclick="playAs(${i})">
      <span style="font-size:2rem">${t.emoji}</span>
      <div>
        <div style="font-weight:900">${t.name}</div>
        <div style="font-size:0.8rem;color:#888">${t.done ? '✅ Finished!' : 'Clue ' + (t.step + 1) + ' of 11'} · ${t.correct} correct</div>
      </div>
      <span class="arrow">→</span>
    </button>`).join('');
}
window.drawTeamSelect = drawTeamSelect;
window.playAs = idx => { ci = idx; go('game'); drawGame(); };

// ── GAME ──────────────────────────────────────────────────────────────────────
function drawGame() {
  const t        = T();
  const qi       = routeIndex(t, t.step);
  const isFinale = t.step >= ROUTE_LENGTH;
  document.getElementById('g-emoji').textContent = t.emoji;
  document.getElementById('g-name').textContent  = t.name;
  if (t.done) { showWin(); return; }
  document.getElementById('g-step').textContent = (t.step + 1) + '/11';
  document.getElementById('g-bar').style.width  = (t.step / 11 * 100) + '%';
  document.getElementById('finale-clue-banner').style.display = isFinale ? 'block' : 'none';
  document.getElementById('finale-q-banner').style.display    = isFinale ? 'block' : 'none';
  t.waitQ ? drawQuestion(qi) : drawClue(qi);
}

function drawClue(qi) {
  document.getElementById('clue-step').style.display = 'block';
  document.getElementById('q-step').style.display    = 'none';
  document.getElementById('feedback').style.display  = 'none';
  document.getElementById('cl-icon').textContent = Q[qi].icon;
  document.getElementById('cl-text').textContent = Q[qi].clue;
  document.getElementById('code-in').value = '';
  document.getElementById('code-in').onkeydown = e => { if (e.key === 'Enter') checkCode(); };
}

window.checkCode = () => {
  const v  = document.getElementById('code-in').value.trim();
  const qi = routeIndex(T(), T().step);
  if (v === Q[qi].code) {
    localTeams[ci].waitQ = true;
    pushTeam(ci, localTeams[ci]);
    pushAct(T().emoji + ' ' + T().name + ' found location ' + (T().step + 1) + '!', '📍');
    drawQuestion(qi);
  } else if (!v) {
    showToast('Enter the secret code first!', 1);
  } else {
    showToast('Wrong code — keep looking! 🔍', 1);
  }
};

function drawQuestion(qi) {
  document.getElementById('clue-step').style.display = 'none';
  document.getElementById('q-step').style.display    = 'block';
  document.getElementById('feedback').style.display  = 'none';
  const d = Q[qi];
  document.getElementById('q-box').className = 'q-box ' + d.qc;
  const b = document.getElementById('q-badge');
  b.className   = 'topic-badge ' + d.tb;
  b.textContent = d.tl;
  document.getElementById('q-text').textContent = d.q;
  const L = ['A','B','C','D'];
  document.getElementById('q-opts').innerHTML = d.opts.map((o, i) => `
    <button class="opt" id="o${i}" onclick="pick(${i})">
      <span class="opt-l">${L[i]}</span>${o}
    </button>`).join('');
}

window.pick = idx => {
  const qi = routeIndex(T(), T().step);
  const d  = Q[qi];
  document.querySelectorAll('.opt').forEach(b => b.disabled = true);
  document.getElementById('o' + idx).classList.add(idx === d.ans ? 'correct' : 'wrong');
  if (idx !== d.ans) document.getElementById('o' + d.ans).classList.add('correct');
  const ok = idx === d.ans;
  if (ok) localTeams[ci].correct++; else localTeams[ci].wrong++;
  pushTeam(ci, localTeams[ci]);
  pushAct(T().emoji + ' ' + T().name + ' — Q' + (T().step + 1) + ' ' + (ok ? 'correct ✅' : 'wrong ❌'), ok ? '✅' : '❌');
  const fb = document.getElementById('feedback');
  fb.className     = 'feedback ' + (ok ? 'fb-correct' : 'fb-wrong');
  fb.style.display = 'block';
  document.getElementById('fb-icon').textContent  = ok ? '🎉' : '😬';
  document.getElementById('fb-title').innerHTML   = ok
    ? '<div class="fb-title-c">CORRECT!</div>'
    : '<div class="fb-title-w">WRONG!</div>';
  document.getElementById('fb-msg').textContent   = d.exp;
  document.getElementById('next-btn').textContent = T().step === Q.length - 1 ? 'Finish! 🏁' : 'Next Clue →';
};

window.nextStep = () => {
  localTeams[ci].step++;
  localTeams[ci].waitQ = false;
  if (localTeams[ci].step >= Q.length) {
    localTeams[ci].done = true;
    pushTeam(ci, localTeams[ci]);
    pushAct('🏆 ' + localTeams[ci].name + ' COMPLETED THE QUEST!', '🏆');
    showWin();
  } else {
    pushTeam(ci, localTeams[ci]);
    drawGame();
  }
};

function showWin() {
  const t = T();
  document.getElementById('win-team').textContent  = t.emoji + ' ' + t.name;
  document.getElementById('win-score').textContent = t.correct + ' correct · ' + t.wrong + ' wrong';
  go('win');
}

// ── PARENT ────────────────────────────────────────────────────────────────────
window.pnav = i => {
  if (document.getElementById('p' + i).value && i < 3)
    document.getElementById('p' + (i + 1)).focus();
};
window.checkPin = () => {
  const pin = [0,1,2,3].map(i => document.getElementById('p'+i).value).join('');
  if (pin === localPin) { go('dashboard'); }
  else {
    const h = document.getElementById('pin-hint');
    h.textContent = '❌ Wrong PIN!'; h.style.color = '#ff2d78';
    [0,1,2,3].forEach(i => document.getElementById('p'+i).value = '');
    document.getElementById('p0').focus();
  }
};

// ── DASHBOARD ─────────────────────────────────────────────────────────────────
function drawDash() {
  const teams  = localTeams;
  const sorted = [...teams].sort((a,b) => b.step - a.step || b.correct - a.correct);
  const leader = sorted[0];

  document.getElementById('dash-teams').innerHTML = teams.map(t => {
    const isLead    = leader && t.name === leader.name && t.step > 0;
    const qi        = routeIndex(t, t.step);
    const clueLabel = t.done
      ? '🏁 Finished!'
      : t.step >= ROUTE_LENGTH
        ? '⭐ FINALE — Q11'
        : 'On clue ' + (t.step + 1) + ' of 11 (Q' + (qi + 1) + ')';
    return `<div class="tp ${isLead ? 'lead' : ''}">
      ${isLead ? '<div style="font-size:0.6rem;font-weight:900;color:#ffe600;margin-bottom:6px">👑 LEADING</div>' : ''}
      <div class="tp-top">
        <span style="font-size:1.8rem">${t.emoji}</span>
        <div>
          <div class="tp-name">${t.name}</div>
          <div class="tp-status">${clueLabel}</div>
        </div>
      </div>
      <div class="tp-bar-bg"><div class="tp-bar" style="width:${t.step / 11 * 100}%"></div></div>
      <div class="tp-stats">
        <span>Progress: ${t.step}/11</span>
        <span>✅ ${t.correct} &nbsp; ❌ ${t.wrong}</span>
      </div>
    </div>`;
  }).join('');

  const feed = document.getElementById('act-feed');
  if (!liveActs.length) {
    feed.innerHTML = '<div class="act-item"><span>🎮</span><span style="color:#888">Waiting for teams to start…</span></div>';
  } else {
    feed.innerHTML = [...liveActs].reverse().slice(0, 20).map(a => `
      <div class="act-item">
        <span>${a.icon}</span><span>${a.text}</span>
        <span class="act-time">${a.time}</span>
      </div>`).join('');
  }

  document.getElementById('qmap-list').innerHTML = Q.map((d, i) => {
    const isFinale  = i === FINALE_INDEX;
    const teamsHere = teams.filter(t => !t.done && routeIndex(t, t.step) === i).length;
    const cls       = isFinale
      ? (teams.some(t => t.step >= ROUTE_LENGTH) ? 'qn-cur' : 'qn-up')
      : (teamsHere > 0 ? 'qn-cur' : 'qn-up');
    return `<div class="qmap-item">
      <div class="qnum ${cls}">${i + 1}${isFinale ? '⭐' : ''}</div>
      <div style="flex:1">
        ${isFinale ? '<strong style="color:#ffe600">FINALE: </strong>' : ''}
        ${d.clue} <span style="color:#555;font-size:0.72rem">(code: ${d.code})</span>
      </div>
      <div class="qmap-topic">${d.tl}</div>
    </div>`;
  }).join('');

  const L = ['A','B','C','D'];
  document.getElementById('qa-list').innerHTML = Q.map((d, i) => {
    const isFinale = i === FINALE_INDEX;
    const opts = d.opts.map((o, oi) => `
      <div class="qa-opt ${oi === d.ans ? 'qa-correct' : ''}">
        <span class="qa-opt-l">${L[oi]}</span>
        ${o}
        ${oi === d.ans ? ' <span style="margin-left:auto;font-size:0.75rem">✅ correct</span>' : ''}
      </div>`).join('');
    return `
      <div class="qa-card" id="qa-${i}">
        <div class="qa-header" onclick="toggleQA(${i})">
          <div class="qa-num ${isFinale ? 'finale' : ''}">${i + 1}${isFinale ? '⭐' : ''}</div>
          <div class="qa-clue-text">${d.icon} ${d.clue}</div>
          <div class="qa-code">🔑 ${d.code}</div>
          <span class="qa-chevron">▼</span>
        </div>
        <div class="qa-body">
          <div class="qa-topic">
            <span class="topic-badge ${d.tb}">${d.tl}</span>
          </div>
          <div class="qa-question">${d.q}</div>
          ${opts}
          <div class="qa-exp">${d.exp}</div>
        </div>
      </div>`;
  }).join('');
}
window.drawDash = drawDash;

window.toggleQA = i => {
  document.getElementById('qa-' + i).classList.toggle('open');
};

window.resetGame = async () => {
  if (!confirm('Reset ALL team progress? Cannot be undone!')) return;
  localTeams = localTeams.map((t, i) => makeTeam(t, i, localTeams.length));
  const to = {};
  localTeams.forEach((t, i) => to[i] = t);
  await fbSet('game', {teams: to, pin: localPin, activity: {}});
  liveActs = []; drawDash(); showToast('All progress reset 🔄');
};

// ── TOAST ─────────────────────────────────────────────────────────────────────
function showToast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'toast show' + (err ? ' err' : '');
  setTimeout(() => el.className = 'toast', 2600);
}
window.showToast = showToast;

// ── INIT ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadFromFB();
  startListening();
  drawSetup();
})();
</script>
